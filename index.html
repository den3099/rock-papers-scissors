<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="app.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock, Paper, Scissors Game!</h1>
    <div id="game-section">
        <div id="game-buttons">
            <button id="start-game">Start Game</button>
            <button id="reset-game">Reset Game</button>
        </div>

        <div id="score">
            <h2>Score</h2>
            <div id="players">
                <p>Player: <span id="player-score">0</span></p>
                <p>Computer: <span id="computer-score">0</span></p>
            </div>
        </div>
        
        <div id="player-selection">
            <button class="player-buttons" id="rock" disabled>Rock</button>
            <button class="player-buttons" id="paper" disabled>Paper</button>
            <button class="player-buttons" id="scissors" disabled>Scissors</button>
        </div>

        <div id="result">
            <p>You chose: <span id="player-choice">-</span></p>
            <p>Computer chose: <span id="computer-choice">-</span></p>
            <p><span id="round-result">Result will appear here</span></p>
        </div>
    </div>
</body>
</html>
